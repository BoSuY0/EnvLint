name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to publish.
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm run package:lint
      - run: npm version "${{ inputs.version }}" --no-git-tag-version
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release and move v1 tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git add -f dist
          git commit -m "release: envlint ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git tag -f v1
          git push origin HEAD --tags --force
          gh release create "v${{ inputs.version }}" --generate-notes
