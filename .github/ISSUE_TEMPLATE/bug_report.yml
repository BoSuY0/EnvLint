name: Bug report
description: Report a reproducible EnvLint problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include minimal files, config, command, expected output, and actual output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EnvLint version
    validations:
      required: true

