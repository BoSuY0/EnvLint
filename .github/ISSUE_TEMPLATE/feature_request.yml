name: Feature request
description: Suggest a language, framework, parser, rule, or workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What env contract failure should EnvLint catch?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior or rule would solve it?
    validations:
      required: true

